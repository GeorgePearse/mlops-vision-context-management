minimum_prek_version = "0.3.8"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ty"
name = "ty"
language = "system"
entry = "uv run ty check"
files = "^(agentic_vision|viewer_api|scripts|tests)/|^pyproject\\.toml$"
pass_filenames = false

[[repos.hooks]]
id = "viewer-lint"
name = "viewer-lint"
language = "system"
entry = "npm --prefix frontend/agentic-vision-viewer run lint"
files = "^frontend/agentic-vision-viewer/"
pass_filenames = false

[[repos.hooks]]
id = "viewer-typecheck"
name = "viewer-typecheck"
language = "system"
entry = "npm --prefix frontend/agentic-vision-viewer run typecheck"
files = "^frontend/agentic-vision-viewer/"
pass_filenames = false
